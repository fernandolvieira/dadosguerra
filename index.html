<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Digital: Dados, Tecnologia e Geopolítica</title>
    <style>
        :root { --primary: #0056b3; --secondary: #6c757d; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; --gray-light: #f1f3f5; --gray-border: #dee2e6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 850px; margin: auto; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .hidden { display: none; }
        h1, h2 { color: #0056b3; text-align: center; margin-top: 0; }
        input[type="text"], textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #003d7a; }
        
        #timer { font-size: 24px; color: var(--danger); font-weight: bold; text-align: right; position: sticky; top: 10px; z-index: 100; background: white; padding: 10px; border-radius: 8px; border: 1px solid var(--gray-border); display: inline-block; float: right; }
        
        .pergunta { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid var(--gray-border); }
        .pergunta p { font-weight: 600; font-size: 18px; margin-bottom: 15px; color: #000; }

        .opcao-item {
            display: flex;
            align-items: center;
            background-color: var(--gray-light);
            margin-bottom: 10px;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--gray-border);
        }
        .opcao-item:hover { background-color: #e9ecef; border-color: var(--primary); }
        .opcao-item input[type="radio"] { margin-right: 15px; width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; }
        .opcao-text { font-size: 16px; color: #333; cursor: pointer; flex-grow: 1; }

        .ranking-area { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body onload="carregarRanking()">

<div class="container">
    <div class="card" id="setup">
        <h1>🛡️ Desafio: Dados e Geopolítica</h1>
        <p style="text-align:center">Exercício em grupo para o 9º Ano (15 questões aleatórias).</p>
        
        <input type="text" id="nomeGrupo" placeholder="Nome do Grupo">
        <textarea id="integrantes" placeholder="Nomes dos integrantes do grupo"></textarea>
        <button onclick="iniciarQuiz()">INICIAR DESAFIO AGORA</button>

        <div class="ranking-area">
            <h2>🏆 Ranking Global da Turma</h2>
            <div id="loaderRanking" style="text-align:center;">Carregando ranking...</div>
            <table id="tabelaRankingInicio" class="hidden">
                <thead>
                    <tr><th>Pos</th><th>Grupo</th><th>Acertos</th><th>Tempo</th></tr>
                </thead>
                <tbody id="corpoRankingInicio"></tbody>
            </table>
        </div>
    </div>

    <div class="card hidden" id="quizContainer">
        <div id="timer">00:00</div>
        <div style="clear: both;"></div>
        <div id="questoesArea"></div>
        <button onclick="finalizarQuiz()" style="background: var(--success); font-size: 20px;">ENVIAR RESPOSTAS</button>
    </div>

    <div class="card hidden" id="posEnvio">
        <h2>✅ Exercício Concluído!</h2>
        <p style="text-align:center; font-size: 18px;">Seus dados foram enviados com sucesso para a planilha do professor Fernando.</p>
        <button onclick="location.reload()">VOLTAR AO INÍCIO</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDiNXJ1sniwLmkwhvP8EH9Huj0jI8tNHFILchrR_KBik2aSKLJIux4a0PxyabkO-2K/exec"; 

    let tempoInicio, intervalo;
    let selecionadas = [];

    const bancoQuestoes = [
        { 
            q: "Um cidadão digital consciente deve agir da seguinte forma em relação aos seus dados:", 
            a: [
                "Utilizar a mesma credencial de acesso em múltiplas plataformas para facilitar a gestão de senhas.", 
                "Aceitar de forma automática todos os termos de serviço para garantir o funcionamento do algoritmo.", 
                "Avaliar criticamente quais permissões de localização e acesso aos sensores concede aos aplicativos.", 
                "Compartilhar conteúdos de alto impacto emocional imediatamente para alertar sua rede de contatos."
            ], 
            c: "Avaliar criticamente quais permissões de localização e acesso aos sensores concede aos aplicativos." 
        },
        { 
            q: "O fenômeno 'Pizza Meter' demonstra uma vulnerabilidade na segurança institucional porque:", 
            a: [
                "A qualidade nutricional das refeições afeta diretamente o rendimento técnico dos servidores públicos.", 
                "Dados comerciais de consumo em massa podem revelar períodos de crise e mobilização de pessoal.", 
                "As empresas de entrega possuem contratos de exclusividade que impedem o sigilo de dados fiscais.", 
                "O custo logístico das entregas noturnas serve como base para o cálculo da inflação em áreas civis."
            ], 
            c: "Dados comerciais de consumo em massa podem revelar períodos de crise e mobilização de pessoal." 
        },
        { 
            q: "A prática de Inteligência de Fontes Abertas (OSINT) consiste essencialmente em:", 
            a: [
                "Executar invasões em servidores criptografados utilizando falhas desconhecidas pelos fabricantes.", 
                "Monitorar comunicações privadas através da instalação de softwares espiões em dispositivos móveis.", 
                "Coletar e analisar sistematicamente dados que estão disponíveis publicamente para livre consulta.", 
                "Recrutar agentes de campo para obter documentos confidenciais dentro de instalações governamentais."
            ], 
            c: "Coletar e analisar sistematicamente dados que estão disponíveis publicamente para livre consulta." 
        },
        { 
            q: "O uso de GPS em aplicativos de saúde por militares em áreas de conflito representa um risco pois:", 
            a: [
                "O consumo excessivo de bateria pode inviabilizar o uso do rádio de comunicação em momentos críticos.", 
                "O sinal de satélite pode interferir na frequência utilizada pelos sistemas de defesa aérea local.", 
                "O mapeamento das rotas percorridas pode expor o perímetro e a rotina de bases militares sigilosas.", 
                "A precisão do algoritmo de corrida diminui consideravelmente em zonas de interferência eletromagnética."
            ], 
            c: "O mapeamento das rotas percorridas pode expor o perímetro e a rotina de bases militares sigilosas." 
        },
        { 
            q: "No contexto da Geopolítica Digital, o termo 'Soberania de Dados' refere-se ao direito de:", 
            a: [
                "Uma nação exercer o controle legal sobre as informações geradas e armazenadas em seu território.", 
                "As Big Techs decidirem quais conteúdos devem ser censurados sem interferência do poder judiciário.", 
                "Os usuários comuns deletarem permanentemente seus rastros digitais de qualquer servidor estrangeiro.", 
                "Um país proibir o uso de satélites internacionais para o monitoramento de suas áreas de preservação."
            ], 
            c: "Uma nação exercer o controle legal sobre as informações geradas e armazenadas em seu território." 
        },
        { 
            q: "Deepfakes representam uma ameaça tecnológica significativa à democracia porque permitem:", 
            a: [
                "Aumentar a velocidade de processamento de vídeos em alta definição para transmissões ao vivo.", 
                "Criar conteúdos audiovisuais sintéticos altamente realistas para manipular a opinião pública.", 
                "Desenvolver filtros de realidade aumentada que facilitam o reconhecimento facial em multidões.", 
                "Automatizar a legenda de vídeos em múltiplos idiomas para ampliar o alcance das redes sociais."
            ], 
            c: "Criar conteúdos audiovisuais sintéticos altamente realistas para manipular a opinião pública." 
        },
        { 
            q: "A infraestrutura de cabos submarinos é considerada um ponto estratégico global pois:", 
            a: [
                "São responsáveis por alimentar as redes de energia das ilhas que não possuem usinas próprias.", 
                "Por eles trafega a quase totalidade das comunicações e dados da internet em nível mundial.", 
                "Servem como suporte físico para a instalação de sensores térmicos que monitoram o clima global.", 
                "Permitem o transporte de dados via rádio frequência entre os continentes de forma analógica."
            ], 
            c: "Por eles trafega a quase totalidade das comunicações e dados da internet em nível mundial." 
        },
        { 
            q: "Dizer que os dados são o 'novo petróleo' significa que, na economia moderna, eles são:", 
            a: [
                "Recursos finitos que precisam ser extraídos do subsolo para garantir o funcionamento das redes.", 
                "O ativo mais valioso para o desenvolvimento de poder econômico, militar e tecnológico atual.", 
                "Elementos altamente poluentes que causam danos irreversíveis ao hardware de grandes servidores.", 
                "Substâncias químicas utilizadas na fabricação de processadores e componentes de inteligência."
            ], 
            c: "O ativo mais valioso para o desenvolvimento de poder econômico, militar e tecnológico atual." 
        },
        { 
            q: "Uma vulnerabilidade 'Zero-Day' em um sistema de segurança digital é caracterizada por:", 
            a: [
                "Ser um erro de programação simples que pode ser corrigido pelo usuário em menos de um dia.", 
                "Uma falha crítica desconhecida pelo fabricante para a qual ainda não existe correção oficial.", 
                "O tempo exato de validade de uma senha temporária antes que o sistema solicite uma nova troca.", 
                "Um protocolo de defesa que impede o acesso de novos usuários em servidores recém-instalados."
            ], 
            c: "Uma falha crítica desconhecida pelo fabricante para a qual ainda não existe correção oficial." 
        },
        { 
            q: "O monitoramento de tanques de petróleo via satélite por empresas privadas serve para:", 
            a: [
                "Garantir que a temperatura interna do combustível não cause explosões em refinarias civis.", 
                "Prever movimentações econômicas e estratégicas com base no estoque real dos adversários.", 
                "Identificar falhas na pintura dos tanques para evitar o desgaste causado pela corrosão marítima.", 
                "Transmitir sinal de rádio para os navios petroleiros que operam fora da cobertura de satélites."
            ], 
            c: "Prever movimentações econômicas e estratégicas com base no estoque real dos adversários." 
        },
        { 
            q: "O 'Direito ao Esquecimento' no ambiente digital é um conceito que discute:", 
            a: [
                "A permissão para que os usuários deletem sua conta de e-mail sem precisar salvar os arquivos antigos.", 
                "A possibilidade de solicitar a desindexação de dados pessoais de buscadores em certas condições.", 
                "O uso de algoritmos que limpam automaticamente o cache do navegador para liberar espaço em disco.", 
                "A obrigatoriedade de as redes sociais apagarem fotos de usuários que não fazem login há um ano."
            ], 
            c: "A possibilidade de solicitar a desindexação de dados pessoais de buscadores em certas condições." 
        },
        { 
            q: "Algoritmos de recomendação podem influenciar a geopolítica ao criar 'bolhas' que:", 
            a: [
                "Aumentam a diversidade de opiniões ao sugerir conteúdos de fontes com pensamentos opostos.", 
                "Reforçam apenas as crenças pré-existentes do usuário, facilitando a polarização da sociedade.", 
                "Bloqueiam automaticamente todas as notícias falsas antes que elas cheguem ao feed do usuário.", 
                "Garantem que todos os cidadãos recebam exatamente as mesmas informações oficiais do governo."
            ], 
            c: "Reforçam apenas as crenças pré-existentes do usuário, facilitando a polarização da sociedade." 
        },
        { 
            q: "A tecnologia 5G é um ponto de disputa entre grandes potências mundiais porque:", 
            a: [
                "O sinal de alta frequência é o único capaz de atravessar paredes de bunkers militares de concreto.", 
                "Quem controla a infraestrutura controla o fluxo de dados de bilhões de dispositivos conectados.", 
                "As antenas chinesas e americanas operam em volts diferentes, o que impede a conexão mundial.", 
                "A instalação desse sistema exige o uso de minerais raros que só existem em territórios neutros."
            ], 
            c: "Quem controla a infraestrutura controla o fluxo de dados de bilhões de dispositivos conectados." 
        },
        { 
            q: "A Engenharia Social é uma tática perigosa em ataques cibernéticos pois foca em:", 
            a: [
                "Manipular psicologicamente as pessoas para que revelem informações ou senhas confidenciais.", 
                "Desenvolver cálculos matemáticos complexos para quebrar a criptografia de pastas protegidas.", 
                "Construir infraestruturas de rede mais eficientes para suportar o tráfego de dados em massa.", 
                "Organizar movimentos sociais através de aplicativos de mensagens para derrubar governos locais."
            ], 
            c: "Manipular psicologicamente as pessoas para que revelem informações ou senhas confidenciais." 
        },
        { 
            q: "Os metadados de uma fotografia digital tirada por um smartphone podem revelar:", 
            a: [
                "Apenas o brilho e o contraste configurados no momento em que a imagem foi capturada.", 
                "Informações precisas sobre o autor, o modelo do aparelho e a localização geográfica da foto.", 
                "O valor de mercado que o usuário pagou pelo dispositivo e a operadora de celular utilizada.", 
                "O nome de todas as pessoas que aparecem na imagem através do reconhecimento facial nativo."
            ], 
            c: "Informações precisas sobre o autor, o modelo do aparelho e a localização geográfica da foto." 
        }
    ];

    function embaralhar(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function formatarTempo(segundos) {
        const mins = Math.floor(segundos / 60);
        const secs = segundos % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    async function carregarRanking() {
        try {
            const response = await fetch(SCRIPT_URL);
            const ranking = await response.json();
            const corpo = document.getElementById('corpoRankingInicio');
            corpo.innerHTML = "";
            ranking.sort((a, b) => b.acertos - a.acertos || a.tempo - b.tempo);
            ranking.forEach((item, index) => {
                const medalha = index === 0 ? "🥇 " : index === 1 ? "🥈 " : index === 2 ? "🥉 " : "";
                corpo.innerHTML += `<tr><td>${medalha}${index + 1}º</td><td style="text-align:left">${item.grupo}</td><td><strong>${item.acertos}/15</strong></td><td>${formatarTempo(item.tempo)}</td></tr>`;
            });
            document.getElementById('loaderRanking').classList.add('hidden');
            document.getElementById('tabelaRankingInicio').classList.remove('hidden');
        } catch (e) {
            document.getElementById('loaderRanking').innerText = "Ranking ainda vazio ou erro de conexão.";
        }
    }

    function iniciarQuiz() {
        const grupo = document.getElementById('nomeGrupo').value.trim();
        const lista = document.getElementById('integrantes').value.trim();
        if(!grupo || !lista) return alert("Por favor, identifique o grupo!");

        document.getElementById('setup').classList.add('hidden');
        document.getElementById('quizContainer').classList.remove('hidden');
        
        selecionadas = embaralhar([...bancoQuestoes]).slice(0, 15).map(q => {
            return { ...q, a: embaralhar([...q.a]) };
        });

        const container = document.getElementById('questoesArea');
        container.innerHTML = "";
        selecionadas.forEach((p, i) => {
            container.innerHTML += `
                <div class="pergunta">
                    <p>${i + 1}. ${p.q}</p>
                    <div class="opcoes-lista">
                        ${p.a.map((opt, j) => `
                            <label class="opcao-item">
                                <input type="radio" name="q${i}" value="${opt.replace(/"/g, '&quot;')}">
                                <span class="opcao-text">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
        });

        window.scrollTo(0, 0);
        tempoInicio = Date.now();
        intervalo = setInterval(() => {
            const segundos = Math.floor((Date.now() - tempoInicio) / 1000);
            document.getElementById('timer').innerText = formatarTempo(segundos);
        }, 1000);
    }

    async function finalizarQuiz() {
        for (let i = 0; i < selecionadas.length; i++) {
            if (!document.querySelector(`input[name="q${i}"]:checked`)) {
                alert(`Por favor, responda à questão ${i + 1} antes de enviar.`);
                return;
            }
        }
        if(!confirm("Tem certeza que deseja enviar suas respostas?")) return;

        clearInterval(intervalo);
        const tempoSegundos = Math.floor((Date.now() - tempoInicio) / 1000);
        let acertos = 0;
        selecionadas.forEach((p, i) => {
            const res = document.querySelector(`input[name="q${i}"]:checked`);
            if(res && res.value === p.c) acertos++;
        });

        const dados = {
            grupo: document.getElementById('nomeGrupo').value,
            integrantes: document.getElementById('integrantes').value,
            acertos: acertos,
            tempo: tempoSegundos
        };

        document.getElementById('quizContainer').innerHTML = "<h2>Enviando resultados para a planilha do Prof. Fernando...</h2>";
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
            setTimeout(() => {
                document.getElementById('quizContainer').classList.add('hidden');
                document.getElementById('posEnvio').classList.remove('hidden');
                window.scrollTo(0, 0);
            }, 1000);
        } catch (e) {
            alert("Erro ao enviar. Tente novamente.");
        }
    }
</script>
</body>
</html>
